name: Build and deploy site

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build publications
        run: python3 build_publications.py

      - name: Prepare site folder
        run: |
          mkdir _site

          cp index.html _site/
          cp style.css _site/
          cp publications.html _site/

          # Images
          [ -f photo-large.jpg ] && cp photo-large.jpg _site/
          [ -f headshot.jpeg ] && cp headshot.jpeg _site/

          # CV and paper/poster PDFs
          cp *.pdf _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
